apiVersion: v1
kind: Pod
metadata:
  name: dns-monitor-pod
  labels:
    app: dns-monitor
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "2222"
spec:
  containers:
    - name: app
      image: alpine:latest
      command: ["/bin/sh", "-c"]
      args: ["while true; do ping -c 1 google.com; sleep 2; ping -c 1 broken-api.internal.local; sleep 2; done"]
    - name: dns-sidecar
      image: dns-sidecar:v1
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 50m
          memory: 32Mi
      securityContext:
        capabilities:
          drop:
            - ALL
          add:
            - NET_ADMIN
            - NET_RAW
      env:
        - name: PROMETHEUS_PORT
          value: "2222"